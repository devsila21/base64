<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Code | NOCTURNAL MD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a0f1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin: 40px auto;
        }

        .card {
            background: rgba(10, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            transform: translateX(-5px);
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
            margin: 20px 0;
            font-family: monospace;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            display: inline-block;
        }

        .qr-container img {
            width: 250px;
            height: 250px;
        }

        .status {
            margin: 20px 0;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .status.loading {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .session-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .session-text {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #3b82f6;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            resize: none;
            height: 100px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            animation: fadeInUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Home</a>
    <div class="container">
        <div class="card">
            <div class="logo">📱</div>
            <h2>QR Code Method</h2>
            <p>Scan with WhatsApp to get your session</p>
            
            <div class="timer" id="timer">02:00</div>
            
            <div class="qr-container" id="qrContainer">
                <div class="status loading" id="status">Generating QR Code...</div>
            </div>
            
            <div id="sessionSection" style="display: none;">
                <div class="session-box">
                    <label>📋 Your Session Base64</label>
                    <textarea class="session-text" id="sessionBase64" readonly></textarea>
                    <button class="copy-btn" onclick="copySession()">📋 Copy Session</button>
                    <p style="font-size: 0.75rem; color: #22c55e; margin-top: 10px;">✅ Session will also be sent to your WhatsApp inbox!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let timerInterval = null;
        let timeLeft = 120;

        async function generateSession() {
            try {
                const response = await fetch('/api/qr-session');
                const data = await response.json();
                
                if (data.success && data.qr) {
                    sessionId = data.sessionId;
                    
                    // Display QR code
                    const qrContainer = document.getElementById('qrContainer');
                    qrContainer.innerHTML = `<img src="${data.qr}" alt="QR Code">`;
                    
                    const statusDiv = document.getElementById('status');
                    statusDiv.className = 'status loading';
                    statusDiv.innerHTML = '✅ QR Code generated! Scan with WhatsApp';
                    
                    // Start timer
                    startTimer();
                    
                    // Check session status
                    checkSessionStatus();
                }
            } catch (error) {
                console.error('Error:', error);
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Failed to generate QR code. Please try again.';
            }
        }

        function startTimer() {
            const timerElement = document.getElementById('timer');
            timerInterval = setInterval(() => {
                timeLeft--;
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.textContent = '00:00';
                    const statusDiv = document.getElementById('status');
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '⏰ Session expired! Please refresh the page.';
                }
            }, 1000);
        }

        async function checkSessionStatus() {
            const checkInterval = setInterval(async () => {
                if (!sessionId) return;
                
                try {
                    const response = await fetch(`/api/session-status/${sessionId}`);
                    const data = await response.json();
                    
                    if (data.exists && data.status === 'connected' && data.sessionBase64) {
                        clearInterval(checkInterval);
                        clearInterval(timerInterval);
                        
                        // Show session
                        const sessionSection = document.getElementById('sessionSection');
                        const sessionTextarea = document.getElementById('sessionBase64');
                        
                        sessionTextarea.value = data.sessionBase64;
                        sessionSection.style.display = 'block';
                        
                        const statusDiv = document.getElementById('status');
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = '✅ Session generated successfully! Check your WhatsApp inbox or copy below.';
                        
                        const timerElement = document.getElementById('timer');
                        timerElement.style.color = '#22c55e';
                    }
                } catch (error) {
                    console.error('Status check error:', error);
                }
            }, 3000);
        }

        function copySession() {
            const sessionTextarea = document.getElementById('sessionBase64');
            sessionTextarea.select();
            document.execCommand('copy');
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '📋 Session copied to clipboard!';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // Generate session on page load
        generateSession();
    </script>
</body>
</html>
