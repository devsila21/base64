<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pairing Code | NOCTURNAL MD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a0f1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin: 40px auto;
        }

        .card {
            background: rgba(10, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            transform: translateX(-5px);
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
            margin: 20px 0;
            font-family: monospace;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .country-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .country-code {
            width: 80px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #3b82f6;
            font-weight: bold;
            text-align: center;
        }

        .phone-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
        }

        .phone-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .pair-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            border: none;
            padding: 14px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .pair-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .pair-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pairing-code {
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }

        .pairing-code p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .code {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
            letter-spacing: 5px;
            font-family: monospace;
        }

        .status {
            margin: 20px 0;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .status.loading {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .session-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .session-text {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: #3b82f6;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            resize: none;
            height: 100px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: scale(1.05);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            animation: fadeInUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Home</a>
    <div class="container">
        <div class="card">
            <div class="logo">🔗</div>
            <h2>Pairing Code Method</h2>
            <p>Enter your phone number to get pairing code</p>
            
            <div class="input-group">
                <label>📞 Phone Number</label>
                <div class="country-select">
                    <div class="country-code">+255</div>
                    <input type="tel" class="phone-input" id="phoneNumber" placeholder="e.g., 756716945" autocomplete="off">
                </div>
                <button class="pair-btn" id="pairBtn" onclick="startPairing()">Generate Pairing Code →</button>
            </div>
            
            <div id="pairingSection" style="display: none;">
                <div class="pairing-code">
                    <p>🔐 Enter this code in WhatsApp:</p>
                    <div class="code" id="pairingCode"></div>
                    <p style="margin-top: 10px;">Open WhatsApp → Settings → Linked Devices → Link with phone number</p>
                </div>
            </div>
            
            <div id="timerSection" style="display: none;">
                <div class="timer" id="timer">02:00</div>
            </div>
            
            <div id="sessionSection" style="display: none;">
                <div class="session-box">
                    <label>📋 Your Session Base64</label>
                    <textarea class="session-text" id="sessionBase64" readonly></textarea>
                    <button class="copy-btn" onclick="copySession()">📋 Copy Session</button>
                    <p style="font-size: 0.75rem; color: #22c55e; margin-top: 10px;">✅ Session will also be sent to your WhatsApp inbox!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let timerInterval = null;
        let timeLeft = 120;

        async function startPairing() {
            const phoneInput = document.getElementById('phoneNumber');
            let phoneNumber = phoneInput.value.trim();
            
            if (!phoneNumber) {
                alert('Please enter your phone number');
                return;
            }
            
            // Clean phone number
            phoneNumber = phoneNumber.replace(/[^0-9]/g, '');
            
            const pairBtn = document.getElementById('pairBtn');
            pairBtn.disabled = true;
            pairBtn.textContent = 'Generating...';
            
            try {
                const response = await fetch(`/api/pair-session?number=${phoneNumber}`);
                const data = await response.json();
                
                if (data.success && data.pairingCode) {
                    sessionId = data.sessionId;
                    
                    // Show pairing code
                    const pairingSection = document.getElementById('pairingSection');
                    const pairingCodeSpan = document.getElementById('pairingCode');
                    pairingCodeSpan.textContent = data.pairingCode;
                    pairingSection.style.display = 'block';
                    
                    // Show timer section
                    const timerSection = document.getElementById('timerSection');
                    timerSection.style.display = 'block';
                    
                    // Start timer
                    startTimer();
                    
                    // Check session status
                    checkSessionStatus();
                    
                    // Add status
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'status loading';
                    statusDiv.id = 'status';
                    statusDiv.innerHTML = '✅ Pairing code generated! Enter it in WhatsApp';
                    document.querySelector('.card').appendChild(statusDiv);
                } else {
                    alert(data.error || 'Failed to generate pairing code');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to generate pairing code. Please try again.');
            } finally {
                pairBtn.disabled = false;
                pairBtn.textContent = 'Generate Pairing Code →';
            }
        }

        function startTimer() {
            const timerElement = document.getElementById('timer');
            timerInterval = setInterval(() => {
                timeLeft--;
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.textContent = '00:00';
                    
                    const statusDiv = document.getElementById('status');
                    if (statusDiv) {
                        statusDiv.className = 'status error';
                        statusDiv.innerHTML = '⏰ Session expired! Please refresh and try again.';
                    }
                }
            }, 1000);
        }

        async function checkSessionStatus() {
            const checkInterval = setInterval(async () => {
                if (!sessionId) return;
                
                try {
                    const response = await fetch(`/api/session-status/${sessionId}`);
                    const data = await response.json();
                    
                    if (data.exists && data.status === 'connected' && data.sessionBase64) {
                        clearInterval(checkInterval);
                        clearInterval(timerInterval);
                        
                        // Show session
                        const sessionSection = document.getElementById('sessionSection');
                        const sessionTextarea = document.getElementById('sessionBase64');
                        
                        sessionTextarea.value = data.sessionBase64;
                        sessionSection.style.display = 'block';
                        
                        const statusDiv = document.getElementById('status');
                        if (statusDiv) {
                            statusDiv.className = 'status success';
                            statusDiv.innerHTML = '✅ Session generated successfully! Check your WhatsApp inbox or copy below.';
                        }
                        
                        const timerElement = document.getElementById('timer');
                        if (timerElement) {
                            timerElement.style.color = '#22c55e';
                        }
                    }
                } catch (error) {
                    console.error('Status check error:', error);
                }
            }, 3000);
        }

        function copySession() {
            const sessionTextarea = document.getElementById('sessionBase64');
            sessionTextarea.select();
            document.execCommand('copy');
            
            // Show toast notification
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '📋 Session copied to clipboard!';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</body>
</html>
